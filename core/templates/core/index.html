<!DOCTYPE html>
<html>
<head>
    <title>TikTok Clone</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
</head>
<body>
<div class="feed">
    {% for video in videos %}
        <div class="video-card">
            <video src="{{ video.video_url }}" controls autoplay loop></video>
            <h3>{{ video.title }}</h3>
            <button onclick="likeVideo({{ video.id }})">
                ❤️ {{ video.likes }}
            </button>
        </div>
    {% endfor %}
</div>

<script src="{% static 'core/js/script.js' %}"></script>
</body>
</html>
